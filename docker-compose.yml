services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gold_asset_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gold_aset}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password_baru}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gold_aset}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gold_network

  # ─────────────────────────────────────────────
  # Backend — Node.js + Express + Prisma
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gold_asset_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password_baru}@db:5432/${POSTGRES_DB:-gold_aset}
      JWT_SECRET: ${JWT_SECRET:-gold-asset-super-secret-jwt-key-2026}
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    networks:
      - gold_network

  # ─────────────────────────────────────────────
  # Frontend — React + Vite (built) served by Nginx
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: gold_asset_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - gold_network

# ─────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────
volumes:
  pgdata:
    name: gold_asset_pgdata

networks:
  gold_network:
    name: gold_asset_network
    driver: bridge
